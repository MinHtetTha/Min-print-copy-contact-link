<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Print & Copy - Contact Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* အခြေခံ Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #e67e22; /* လိမ္မော်ရောင် Background */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* Profile ပိုင်း */
        .profile {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 120px; /* Logo Container အရွယ်အစားကို အရင်အတိုင်း ထားပါတယ် */
            height: 120px;
            background: #ffffff;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            overflow: hidden;
            padding: 5px; /* ပုံကို အဝိုင်းနဲ့ နည်းနည်း ဝေးအောင် padding ထည့်ပေးထားတယ် */
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ပုံကို ကြီးမနေအောင် contain နဲ့ ချုပ်ပေးလိုက်တာပါ */
        }

        h1 {
            color: #000;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .description {
            color: #000;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 0 10px;
            font-weight: 600;
        }

        /* Button များ (Links) */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: #ffffff;
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center; /* စာသားတွေကို Button ရဲ့ အလယ်တည့်တည့် ရောက်အောင် လုပ်ပေးထားပါတယ် */
            position: relative; /* Icon အတွက် နေရာချဖို့ */
            transition: all 0.3s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            width: 100%;
        }

        .link-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            background-color: #fcfcfc;
        }

        /* Icon ကို ဘယ်ဘက်မှာပဲ ကပ်ထားပါတယ် */
        .link-item i {
            font-size: 20px;
            position: absolute;
            left: 20px;
        }

        /* Icon အရောင်များ */
        .fa-telegram { color: #0088cc; }
        .fa-viber { color: #7360f2; }
        .fa-facebook-messenger { color: #006aff; }
        .fa-instagram { color: #e1306c; }
        .fa-envelope { color: #ea4335; }
        .fa-phone-alt { color: #34a853; }

        .link-text {
            font-weight: 700;
            font-size: 16px;
            text-align: center;
        }

        .footer-note {
            margin-top: 35px;
            font-size: 12px;
            color: #000;
            font-weight: bold;
            opacity: 0.8;
        }
    </style>
</head>
<body>

            <p class="description">

            </p>
        </div>

        <div class="links-group">
            <a href="https://t.me/minhtetthar428" class="link-item" target="_blank">
                <i class="fab fa-telegram"></i>
                <span class="link-text">Telegram</span>
            </a>

            <a href="https://msng.link/o/?959964563388=vi" class="link-item" target="_blank">
                <i class="fab fa-viber"></i>
                <span class="link-text">Viber (Need VPN)</span>
            </a>

            <a href="https://m.me/min.htet.thar.886065" class="link-item" target="_blank">
                <i class="fab fa-facebook-messenger"></i>
                <span class="link-text">Messenger (Need VPN)</span>
            </a>

            <a href="https://www.instagram.com/minhtetthar428" class="link-item" target="_blank">
                <i class="fab fa-instagram"></i>
                <span class="link-text">Instagram (Need VPN)</span>
            </a>

            <a href="mailto:paannpyoelaat428@gmail.com" class="link-item">
                <i class="fas fa-envelope"></i>
                <span class="link-text">paannpyoelaat428@gmail.com</span>
            </a>

            <a href="tel:+959964563388" class="link-item">
                <i class="fas fa-phone-alt"></i>
                <span class="link-text">Contact Number</span>
            </a>
        </div>

        <div class="footer-note">
            © 2026 Min Print & Copy
        </div>
    </div>

</body>
</html>
